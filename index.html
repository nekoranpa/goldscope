
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GoldScope AI</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:sans-serif;
      background:#0f172a;
      color:white;
      min-height:100vh;
    }

    .container{
      max-width:1200px;
      margin:auto;
      padding:40px 20px;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:60px;
    }

    .logo{
      font-size:28px;
      font-weight:bold;
      color:#f59e0b;
    }

    .hero{
      text-align:center;
      padding:80px 20px;
    }

    .hero h1{
      font-size:56px;
      margin-bottom:20px;
    }

    .hero p{
      color:#cbd5e1;
      font-size:20px;
      margin-bottom:40px;
    }

    .price-box{
      background:#111827;
      border-radius:20px;
      padding:40px;
      max-width:500px;
      margin:40px auto;
      box-shadow:0 10px 30px rgba(0,0,0,.4);
    }

    .price-title{
      color:#94a3b8;
      margin-bottom:15px;
      font-size:18px;
    }

    .price{
      font-size:56px;
      font-weight:bold;
      color:#f59e0b;
    }

    .source{
      margin-top:15px;
      color:#64748b;
      font-size:14px;
    }

    .buttons{
      margin-top:40px;
      display:flex;
      gap:20px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .btn{
      padding:14px 24px;
      border-radius:12px;
      text-decoration:none;
      font-weight:bold;
      transition:.2s;
    }

    .btn-primary{
      background:#f59e0b;
      color:black;
    }

    .btn-secondary{
      border:1px solid #334155;
      color:white;
    }

    .btn:hover{
      opacity:.9;
      transform:translateY(-2px);
    }

    footer{
      text-align:center;
      padding:40px;
      color:#64748b;
      margin-top:80px;
    }

    .error{
      color:#ef4444;
      margin-top:15px;
    }
  </style>
</head>
<body>

  <div class="container">

    <header>
      <div class="logo">GoldScope AI</div>
    </header>

    <section class="hero">

      <h1>リアルタイム金価格分析</h1>

      <p>
        AIによるゴールド市場監視プラットフォーム
      </p>

      <div class="price-box">

        <div class="price-title">
          XAU/USD
        </div>

        <div class="price" id="gold-price">
          Loading...
        </div>

        <div class="source" id="gold-source">
          データ取得中...
        </div>

        <div class="error" id="gold-error"></div>

      </div>

      <div class="buttons">

        <a
          class="btn btn-primary"
          href="https://goldscope.ai/api/gold"
          target="_blank"
        >
          API確認
        </a>

        <a
          class="btn btn-secondary"
          href="/admin.html"
        >
          管理者ログイン
        </a>

      </div>

    </section>

    <footer>
      © 2026 GoldScope AI
    </footer>

  </div>

  <script>
    async function loadGoldPrice(){

      try{

        const res = await fetch('/api/gold');
        const data = await res.json();

        if(!data.ok){
          throw new Error(data.error || 'API Error');
        }

        document.getElementById('gold-price').innerText =
          '$' + Number(data.rate).toLocaleString();

        document.getElementById('gold-source').innerText =
          'Source: ' + data.source;

      }catch(err){

        document.getElementById('gold-error').innerText =
          '取得できませんでした。';

        console.error(err);
      }
    }

    loadGoldPrice();
  </script>

</body>
</html>
