  <script>
(function(){
  'use strict';

  // ========================================================
  // GoldScope Vision v2.9 統合パッチ
  // 内容:
  // - 重複ID対策
  // - sigComment3不足対策
  // - 反発リスクスコア
  // - calcEntryGate統合版
  // - analyze()へのreboundRisk合成
  // - renderAtBody()反発リスク対応
  // - Performance Tracker上書き修正
  // - setFilter統一
  // - buildNarration反発リスク警告
  // - buildEASignal() EA用JSON生成
  // ========================================================

  if (typeof window.$ !== 'function') {
    window.$ = function(id){
      return document.getElementById(id) || {
        textContent:'',
        style:{},
        className:'',
        innerHTML:'',
        value:'',
        addEventListener:function(){},
        classList:{add:function(){},remove:function(){}}
      };
    };
  }

  // ========================================================
  // 1. 重複ID・不足要素対策
  // ========================================================
  function patchDuplicateIds(){
    try{
      var hfmEls = document.querySelectorAll('#hfmInfo');
      if(hfmEls.length > 1){
        hfmEls[0].id = 'hfmInfoClock';
        hfmEls[1].id = 'hfmInfoMonitor';
      }

      var speakEls = document.querySelectorAll('#speakAnim');
      if(speakEls.length > 1){
        speakEls[0].id = 'speakAnimHeader';
        speakEls[1].id = 'speakAnimVoice';
      }

      if(!document.getElementById('sigComment3')){
        var hero3 = document.getElementById('signalHero3');
        if(hero3){
          var div = document.createElement('div');
          div.className = 'sig-comment';
          div.id = 'sigComment3';
          div.style.marginTop = '10px';
          div.textContent = '--';
          hero3.appendChild(div);
        }
      }
    }catch(e){
      console.warn('[GSV patchDuplicateIds]', e.message);
    }
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', patchDuplicateIds);
  } else {
    patchDuplicateIds();
  }

  // ========================================================
  // 2. 反発リスクスコア
  // ========================================================
  window.calcReboundRisk = function calcReboundRisk(p){
    var obj = p || {};
    var price = obj.price;
    var dir = obj.dir;
    var ATR = obj.ATR;
    var ADX = obj.ADX;
    var BB = obj.BB;
    var SMC = obj.SMC;
    var emaWalls = obj.emaWalls;
    var fvgData = obj.fvgData;
    var TECH = obj.TECH;

    if(!price || !dir || dir === 'neut'){
      return {
        score: 0,
        decision: 'normal',
        label: '方向未確定',
        lotMultiplier: 1.0,
        tpMultiplier: 1.0,
        autoTradeAllowed: true,
        nearestWall: null,
        strongestWall: null,
        walls: []
      };
    }

    var atr = ATR || 3;
    var adx = ADX && typeof ADX.adx === 'number' ? ADX.adx : 20;
    var walls = [];
    var score = 0;

    function addWall(w){
      if(!w || !w.price || isNaN(w.price)) return;

      var wallPrice = Number(w.price);
      var distance = Math.abs(wallPrice - price);
      var distanceAtr = distance / Math.max(atr, 0.01);

      var isAhead =
        (dir === 'up' && wallPrice > price) ||
        (dir === 'dn' && wallPrice < price);

      if(!isAhead) return;

      var weight = w.weight || 10;
      var add = 0;

      if(distanceAtr <= 0.4) add += weight * 1.8;
      else if(distanceAtr <= 0.8) add += weight * 1.4;
      else if(distanceAtr <= 1.2) add += weight * 1.0;
      else if(distanceAtr <= 1.8) add += weight * 0.55;
      else if(distanceAtr <= 2.5) add += weight * 0.25;
      else return;

      if(adx < 18) add *= 1.35;
      else if(adx < 25) add *= 1.15;
      else if(adx >= 35) add *= 0.75;

      add = Math.round(add);
      score += add;

      walls.push({
        type: w.type || 'WALL',
        label: w.label || '壁',
        wallPrice: parseFloat(wallPrice.toFixed(1)),
        distance: parseFloat(distance.toFixed(1)),
        distanceAtr: parseFloat(distanceAtr.toFixed(2)),
        add: add,
        kind: w.kind || 'resistance',
        reason: w.reason || ''
      });
    }

    if(dir === 'up'){
      (SMC && SMC.strongHighs ? SMC.strongHighs : []).forEach(function(sh){
        addWall({
          type: 'STRONG_HIGH',
          label: 'Strong High ' + (sh.count || 2) + '回反発',
          price: sh.price,
          weight: sh.count >= 3 ? 26 : 20,
          kind: 'resistance',
          reason: '過去に複数回反落している上値抵抗'
        });
      });
    }

    if(dir === 'dn'){
      (SMC && SMC.strongLows ? SMC.strongLows : []).forEach(function(sl){
        addWall({
          type: 'STRONG_LOW',
          label: 'Strong Low ' + (sl.count || 2) + '回反発',
          price: sl.price,
          weight: sl.count >= 3 ? 26 : 20,
          kind: 'support',
          reason: '過去に複数回反発している下値支持'
        });
      });
    }

    (emaWalls || []).forEach(function(w){
      var isRelevant =
        (dir === 'up' && w.role === 'resist') ||
        (dir === 'dn' && w.role === 'support');

      if(!isRelevant) return;

      addWall({
        type: w.label,
        label: w.label + ' ' + (w.role === 'resist' ? '抵抗' : '支持'),
        price: w.val,
        weight: w.label === '320SMA' ? 24 :
                w.label === 'EMA200' ? 20 :
                w.label === 'EMA75' ? 14 : 8,
        kind: w.role === 'resist' ? 'resistance' : 'support',
        reason: w.label + 'が進行方向の壁'
      });
    });

    if(BB){
      if(dir === 'up'){
        addWall({
          type: 'BB_UPPER',
          label: 'BB上限',
          price: BB.u,
          weight: 12,
          kind: 'resistance',
          reason: 'ボリンジャーバンド上限接近'
        });
      } else if(dir === 'dn'){
        addWall({
          type: 'BB_LOWER',
          label: 'BB下限',
          price: BB.l,
          weight: 12,
          kind: 'support',
          reason: 'ボリンジャーバンド下限接近'
        });
      }
    }

    var nf = fvgData && fvgData.nearFVG;
    if(nf){
      if(dir === 'up' && nf.type === 'bear'){
        addWall({
          type: 'BEAR_FVG',
          label: '売りFVG抵抗',
          price: nf.low,
          weight: 18,
          kind: 'resistance',
          reason: '上方向に売りFVGがある'
        });
      }

      if(dir === 'dn' && nf.type === 'bull'){
        addWall({
          type: 'BULL_FVG',
          label: '買いFVG支持',
          price: nf.high,
          weight: 18,
          kind: 'support',
          reason: '下方向に買いFVGがある'
        });
      }
    }

    if(TECH && TECH.nearFibo){
      addWall({
        type: 'FIBO',
        label: 'Fibo ' + TECH.nearFibo[0],
        price: TECH.nearFibo[1],
        weight: 8,
        kind: dir === 'up' ? 'resistance' : 'support',
        reason: 'フィボナッチ節目が近い'
      });
    }

    score = Math.max(0, Math.min(100, Math.round(score)));

    var nearestWall = walls.length
      ? walls.slice().sort(function(a,b){ return a.distance - b.distance; })[0]
      : null;

    var strongestWall = walls.length
      ? walls.slice().sort(function(a,b){ return b.add - a.add; })[0]
      : null;

    var decision = 'normal';
    var label = '通常エントリー可';
    var lotMultiplier = 1.0;
    var tpMultiplier = 1.0;
    var autoTradeAllowed = true;

    if(score >= 85){
      decision = 'blocked';
      label = '反発リスク極大 — エントリー禁止';
      lotMultiplier = 0;
      tpMultiplier = 0;
      autoTradeAllowed = false;
    } else if(score >= 70){
      decision = 'manual_only';
      label = '反発リスク高 — 自動売買禁止・手動確認';
      lotMultiplier = 0;
      tpMultiplier = 0;
      autoTradeAllowed = false;
    } else if(score >= 50){
      decision = 'reduce';
      label = '反発リスク中 — ロット半分・TP短縮';
      lotMultiplier = 0.5;
      tpMultiplier = 0.6;
      autoTradeAllowed = true;
    }

    return {
      score: score,
      decision: decision,
      label: label,
      lotMultiplier: lotMultiplier,
      tpMultiplier: tpMultiplier,
      autoTradeAllowed: autoTradeAllowed,
      nearestWall: nearestWall,
      strongestWall: strongestWall,
      walls: walls
    };
  };

  // ========================================================
  // 3. calcEntryGate 統合版
  // ========================================================
  window.calcEntryGate = function calcEntryGate(p){
    var obj = p || {};

    var price = obj.price;
    var ATR = obj.ATR || 1;
    var ADX = obj.ADX || {};
    var signal = obj.signal || {};
    var BB = obj.BB;
    var SMC = obj.SMC || {};
    var isTrueSqueeze = obj.isTrueSqueeze;
    var e75 = obj.e75;
    var e80 = obj.e80;
    var sma320 = obj.sma320;
    var TECH = obj.TECH || {};
    var changePct = obj.changePct || 0;
    var rsiVal = obj.rsiVal || 50;
    var reboundRisk = obj.reboundRisk;

    var adx = ADX.adx || 20;
    var dir = signal.mainDir || 'neut';
    var blocked = [];
    var warnings = [];

    if(isTrueSqueeze){
      blocked.push({
        code:'SQUEEZE',
        label:'⚡ BBスクイーズ中',
        detail:'ボラティリティが極限収縮。方向が読めないためエントリー禁止。ブレイク確認後に待機。',
        severity:'critical'
      });
    }

    var isSlowTrend = adx >= 15 && adx < 25 && Math.abs(changePct || 0) > 0.02;

    if(adx < 25 && !isSlowTrend){
      blocked.push({
        code:'LOW_ADX',
        label:'📊 ADX' + adx + '（25未満）',
        detail:'トレンドの勢いが不足。ADX25以上になるまで待機。現在' + adx + '。',
        severity:'high'
      });
    }

    var dangerSH = (SMC.strongHighs || []).find(function(sh){
      return sh.isCrit || (sh.isWarn && dir === 'up');
    });

    var dangerSL = (SMC.strongLows || []).find(function(sl){
      return sl.isCrit || (sl.isWarn && dir === 'dn');
    });

    if(dangerSH){
      var distOkH = dangerSH.distPips > Math.round(ATR * 3 / 0.01);
      if(!distOkH || dangerSH.isCrit){
        blocked.push({
          code:'STRONG_HIGH',
          label:'🔴 ' + dangerSH.label + 'が近い',
          detail:'$' + dangerSH.price + 'に' + dangerSH.count + '回反発のStrong High。ここに向かっての買いは禁止。ブレイクとリテスト確認後のみ可。',
          severity:'high'
        });
      }
    }

    if(dangerSL){
      var distOkL = dangerSL.distPips > Math.round(ATR * 3 / 0.01);
      if(!distOkL || dangerSL.isCrit){
        blocked.push({
          code:'STRONG_LOW',
          label:'🟢 ' + dangerSL.label + 'が近い',
          detail:'$' + dangerSL.price + 'に' + dangerSL.count + '回反発のStrong Low。ここに向かっての売りは禁止。ブレイクとリテスト確認後のみ可。',
          severity:'high'
        });
      }
    }

    var sma80v = e80 || e75;
    var dist80 = Math.abs((sma80v || price) - price);
    var dist320 = sma320 ? Math.abs(sma320 - price) : 999;
    var sandwiched = dist80 < ATR * 1.0 && dist320 < ATR * 1.5;

    if(sandwiched){
      blocked.push({
        code:'MA_SANDWICH',
        label:'📊 80SMA・320SMAの間に挟まれている',
        detail:'80SMAと320SMAの間で身動きが取れない状態。どちらかを明確に抜けてから判断。',
        severity:'medium'
      });
    }

    if(dir === 'up' && dangerSH && dangerSH.distPips < Math.round(3 / 0.01)){
      blocked.push({
        code:'NO_ROOM_UP',
        label:'🚧 抵抗まで$' + (dangerSH.distPips * 0.01).toFixed(1) + 'しかない',
        detail:'上昇方向だが$' + dangerSH.price + 'のStrong Highまで$' + (dangerSH.distPips * 0.01).toFixed(1) + 'しかない。最低$4の値幅が必要。',
        severity:'high'
      });
    }

    if(dir === 'dn' && dangerSL && dangerSL.distPips < Math.round(3 / 0.01)){
      blocked.push({
        code:'NO_ROOM_DN',
        label:'🚧 支持まで$' + (dangerSL.distPips * 0.01).toFixed(1) + 'しかない',
        detail:'下降方向だが$' + dangerSL.price + 'のStrong Lowまで$' + (dangerSL.distPips * 0.01).toFixed(1) + 'しかない。最低$4の値幅が必要。',
        severity:'high'
      });
    }

    if(SMC.bos && !SMC.obRetest){
      warnings.push({
        code:'AWAIT_RETEST',
        label:'⏳ BOSは確認済み。リテスト待ち',
        detail:SMC.bos.label + 'が確認されましたが、まだリテストがありません。OBに戻ってきてからエントリー。'
      });
    }

    if(reboundRisk && reboundRisk.score >= 85){
      blocked.push({
        code:'REBOUND_BLOCK',
        label:'🧱 反発リスク' + reboundRisk.score,
        detail:reboundRisk.label + '。最寄りの壁: ' + (reboundRisk.nearestWall ? reboundRisk.nearestWall.label : '--') + ' $' + (reboundRisk.nearestWall ? reboundRisk.nearestWall.wallPrice : '--') + '。距離$' + (reboundRisk.nearestWall ? reboundRisk.nearestWall.distance : '--') + '。',
        severity:'critical'
      });
    } else if(reboundRisk && reboundRisk.score >= 70){
      blocked.push({
        code:'REBOUND_MANUAL_ONLY',
        label:'🧱 反発リスク' + reboundRisk.score,
        detail:reboundRisk.label + '。自動売買では見送り、手動確認のみ。最寄りの壁: ' + (reboundRisk.nearestWall ? reboundRisk.nearestWall.label : '--') + '。',
        severity:'high'
      });
    } else if(reboundRisk && reboundRisk.score >= 50){
      warnings.push({
        code:'REBOUND_REDUCE',
        label:'🧱 反発リスク' + reboundRisk.score + ' — ロット半分推奨',
        detail:reboundRisk.label + '。最寄りの壁: ' + (reboundRisk.nearestWall ? reboundRisk.nearestWall.label : '--') + ' $' + (reboundRisk.nearestWall ? reboundRisk.nearestWall.wallPrice : '--') + '。'
      });
    }

    if(TECH.triangleBreak && TECH.triangleBreak.dir === 'wait'){
      warnings.push({
        code:'TRIANGLE_WAIT',
        label:TECH.triangleBreak.label,
        detail:'三角持ち合いの中にいます。ブレイクするまでエントリー見送り推奨。'
      });
    }

    var bbWalkActive = SMC.bbWalk;

    if(bbWalkActive){
      warnings.push({
        code:'BAND_WALK',
        label:bbWalkActive.label,
        detail:'バンドウォーク中。勢いが続く間はトレンドフォロー有効。バンドから離れたら終了サイン。',
        positive:true
      });
    }

    var obRetestSignal = SMC.obRetest && SMC.obRetest.entrySignal;
    var bbBounceSignal = null;

    if(!bbWalkActive && BB && adx <= 22){
      var distFromUpper = Math.abs(price - BB.u);
      var distFromLower = Math.abs(price - BB.l);
      var nearUpper = distFromUpper < ATR * 0.4;
      var nearLower = distFromLower < ATR * 0.4;
      var touchUpper = price >= BB.u * 0.9995;
      var touchLower = price <= BB.l * 1.0005;
      var bbWidth = BB.u - BB.l;
      var worthBounce = bbWidth >= 4.0;

      if((touchUpper || nearUpper) && rsiVal >= 62 && worthBounce){
        var hasStrongH = (SMC.strongHighs || []).some(function(s){
          return Math.abs(s.price - BB.u) < ATR * 0.5;
        });

        var scoreH = (rsiVal >= 70 ? 3 : 1) + (hasStrongH ? 2 : 0) + (adx <= 15 ? 1 : 0);

        bbBounceSignal = {
          type:'sell',
          entryAt:parseFloat(BB.u.toFixed(1)),
          target:parseFloat(BB.m.toFixed(1)),
          targetFull:parseFloat(BB.l.toFixed(1)),
          sl:parseFloat((BB.u + ATR * 0.5).toFixed(1)),
          pips:Math.round((BB.u - BB.m)/0.01),
          fullPips:Math.round((BB.u - BB.l)/0.01),
          score:scoreH,
          strong:scoreH >= 3,
          label:hasStrongH ? '🔴 BB上限+Strong High反発売り（スコア' + scoreH + '）' : '🟠 BB上限反発売り（スコア' + scoreH + '）',
          slNote:'SL: $' + (BB.u + ATR * 0.5).toFixed(1) + '（上限+ATR×0.5）',
          reason:'ADX' + adx + 'レンジ。BB上限$' + BB.u.toFixed(1) + 'でRSI' + rsiVal + '。'
        };
      } else if((touchLower || nearLower) && rsiVal <= 38 && worthBounce){
        var hasStrongL = (SMC.strongLows || []).some(function(s){
          return Math.abs(s.price - BB.l) < ATR * 0.5;
        });

        var scoreL = (rsiVal <= 30 ? 3 : 1) + (hasStrongL ? 2 : 0) + (adx <= 15 ? 1 : 0);

        bbBounceSignal = {
          type:'buy',
          entryAt:parseFloat(BB.l.toFixed(1)),
          target:parseFloat(BB.m.toFixed(1)),
          targetFull:parseFloat(BB.u.toFixed(1)),
          sl:parseFloat((BB.l - ATR * 0.5).toFixed(1)),
          pips:Math.round((BB.m - BB.l)/0.01),
          fullPips:Math.round((BB.u - BB.l)/0.01),
          score:scoreL,
          strong:scoreL >= 3,
          label:hasStrongL ? '🟢 BB下限+Strong Low反発買い（スコア' + scoreL + '）' : '🔵 BB下限反発買い（スコア' + scoreL + '）',
          slNote:'SL: $' + (BB.l - ATR * 0.5).toFixed(1) + '（下限−ATR×0.5）',
          reason:'ADX' + adx + 'レンジ。BB下限$' + BB.l.toFixed(1) + 'でRSI' + rsiVal + '。'
        };
      }
    }

    var allowed = blocked.length === 0;

    var primary =
      blocked.find(function(b){ return b.severity === 'critical'; }) ||
      blocked.find(function(b){ return b.severity === 'high'; }) ||
      blocked[0];

    var slowTrendTP = null;

    if(isSlowTrend && TECH.fibo){
      var entries = Object.entries(TECH.fibo);
      slowTrendTP =
        entries.find(function(x){ return x[0] === '61.8%'; }) ||
        entries.find(function(x){ return x[0] === '50.0%'; });
    }

    return {
      allowed: allowed,
      blocked: blocked,
      warnings: warnings,
      primaryReason: primary ? primary.detail : '',
      criticalBlocked: blocked.some(function(b){ return b.severity === 'critical'; }),
      highBlocked: blocked.some(function(b){ return b.severity === 'high'; }),
      obRetestSignal: obRetestSignal,
      bbWalkActive: bbWalkActive,
      bbBounceSignal: bbBounceSignal,
      isSlowTrend: isSlowTrend,
      slowTrendTP: slowTrendTP,
      dangerSH: dangerSH,
      dangerSL: dangerSL,
      sandwiched: sandwiched,
      reboundRisk: reboundRisk,
      autoTradeAllowed: allowed && (!reboundRisk || reboundRisk.autoTradeAllowed !== false),
      lotMultiplier: reboundRisk && reboundRisk.lotMultiplier !== undefined ? reboundRisk.lotMultiplier : 1.0,
      tpMultiplier: reboundRisk && reboundRisk.tpMultiplier !== undefined ? reboundRisk.tpMultiplier : 1.0,
      entryPattern: obRetestSignal ? 'OB_RETEST'
        : bbBounceSignal && bbBounceSignal.strong ? 'BB_BOUNCE_STRONG'
        : bbBounceSignal ? 'BB_BOUNCE'
        : SMC.choch ? 'CHOCH'
        : SMC.bos && allowed ? 'BOS_CLEAR'
        : bbWalkActive && bbWalkActive.positive ? 'BAND_WALK'
        : isSlowTrend ? 'SLOW_TREND'
        : reboundRisk && reboundRisk.decision === 'reduce' ? 'REDUCED_RISK'
        : 'NONE'
    };
  };
